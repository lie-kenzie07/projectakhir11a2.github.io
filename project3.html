<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 3 - Kalkulator BMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container bmi-container">
    <a href="index.html" class="btn btn-material mb-4">&larr; Kembali ke Index</a>

    <div class="material-card p-4">
        <h4 class="text-center mb-2 text-primary-material fw-bold">Kalkulator BMI</h4>
        <p class="text-center text-secondary-material mb-4" style="font-size: 0.9rem;">Hitung indeks massa tubuh (BMI) untuk mengetahui status berat badan ideal berdasarkan rasio tinggi dan berat badan.</p>
        
        <div class="mb-3">
            <label class="form-label text-secondary-material fw-semibold">Berat Badan (kg)</label>
            <input type="number" id="weight" class="form-control input-bmi" placeholder="Contoh: 65">
        </div>
        
        <div class="mb-4">
            <label class="form-label text-secondary-material fw-semibold">Tinggi Badan (cm)</label>
            <input type="number" id="height" class="form-control input-bmi" placeholder="Contoh: 170">
        </div>
        
        <button class="btn btn-material w-100 py-3 mb-4 fs-6" onclick="calculateBMI()">Hitung BMI</button>
        
        <div id="resultCard" class="bmi-result-box text-center d-none">
            <h5 class="mb-2 text-secondary-material fs-6">Skor BMI Anda:</h5>
            <div id="bmiValue" class="display-5 fw-bold text-primary-material mb-3">0.0</div>
            <span id="bmiStatus" class="material-badge rounded-pill">Status</span>
        </div>
    </div>
</div>

<script>
    function calculateBMI() {
        const weight = parseFloat(document.getElementById('weight').value);
        const heightInCm = parseFloat(document.getElementById('height').value);
        const resultCard = document.getElementById('resultCard');
        const bmiValue = document.getElementById('bmiValue');
        const bmiStatus = document.getElementById('bmiStatus');

        if (weight > 0 && heightInCm > 0) {
            const heightInM = heightInCm / 100;
            const bmi = (weight / (heightInM * heightInM)).toFixed(1);
            
            bmiValue.innerText = bmi;
            resultCard.classList.remove('d-none');
            
            if (bmi < 18.5) {
                bmiStatus.innerText = "Kekurangan Berat Badan";
                bmiStatus.style.backgroundColor = "#ffe0b2";
                bmiStatus.style.color = "#b66a00";
            } else if (bmi >= 18.5 && bmi < 24.9) {
                bmiStatus.innerText = "Normal (Ideal)";
                bmiStatus.style.backgroundColor = "var(--primary-light)";
                bmiStatus.style.color = "var(--primary-color)";
            } else if (bmi >= 25 && bmi < 29.9) {
                bmiStatus.innerText = "Kelebihan Berat Badan";
                bmiStatus.style.backgroundColor = "#ffe0b2";
                bmiStatus.style.color = "#b66a00";
            } else {
                bmiStatus.innerText = "Obesitas";
                bmiStatus.style.backgroundColor = "#ffcdd2";
                bmiStatus.style.color = "#b71c1c";
            }
        } else {
            alert("Harap masukkan data tinggi dan berat badan yang valid!");
        }
    }
</script>

</body>
</html>
