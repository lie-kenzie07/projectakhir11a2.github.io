<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 2 - To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container todo-container">
    <a href="index.html" class="btn btn-material mb-4">&larr; Kembali ke Index</a>

    <div class="material-card p-4">
        <h4 class="text-center mb-2 text-primary-material fw-bold">To-Do List</h4>
        <p class="text-center text-secondary-material mb-4" style="font-size: 0.9rem;">Catat dan kelola tugas harianmu dengan mudah. Tambahkan list baru dan hapus jika sudah selesai dikerjakan.</p>
        
        <div class="input-group mb-4">
            <input type="text" id="taskInput" class="form-control form-control-lg input-todo" placeholder="Tulis tugas baru...">
            <button class="btn btn-todo-add" onclick="addTask()">Tambah</button>
        </div>
        
        <ul id="taskList" class="list-group">
        </ul>
    </div>
</div>

<script>
    function addTask() {
        const input = document.getElementById('taskInput');
        const taskText = input.value.trim();
        
        if (taskText !== "") {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center todo-item shadow-sm text-secondary-material fw-medium';
            li.innerHTML = `
                <span>${taskText}</span>
                <button class="btn btn-sm btn-outline-danger px-3 rounded-pill" onclick="this.parentElement.remove()">Hapus</button>
            `;
            document.getElementById('taskList').appendChild(li);
            input.value = "";
        }
    }
</script>

</body>
</html>
