<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>prj2 todo list</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .todo-container { max-width: 520px; margin: 50px auto; }
        .form-control-custom { border-radius: 24px 0 0 24px; border: 1px solid var(--border-color); padding-left: 20px; }
        .form-control-custom:focus { border-color: var(--primary-color); box-shadow: none; background-color: #ffffff; }
        .btn-todo-add { border-radius: 0 24px 24px 0 !important; background-color: var(--primary-color); color: #ffffff; border: none; font-weight: 600; padding: 0 24px; transition: all 0.2s; }
        .btn-todo-add:hover { opacity: 0.9; }
        .todo-item { border-radius: 16px !important; border: 1px solid var(--border-color) !important; background: var(--card-bg); margin-bottom: 10px; transition: all 0.2s ease; padding: 14px 20px !important; }
        .todo-item:hover { border-color: var(--primary-light) !important; transform: translateX(3px); }
    </style>
</head>
<body>

<div class="container todo-container">
    <a href="index.html" class="btn btn-material mb-4">&larr; Kembali ke Index</a>

    <div class="material-card p-4">
        <h4 class="text-center mb-4 text-primary-material fw-bold">To-Do List</h4>
        
        <div class="input-group mb-4">
            <input type="text" id="taskInput" class="form-control form-control-lg form-control-custom" placeholder="Tulis tugas baru...">
            <button class="btn btn-todo-add" onclick="addTask()">Tambah</button>
        </div>
        
        <ul id="taskList" class="list-group">
        </ul>
    </div>
</div>

<script>
    function addTask() {
        const input = document.getElementById('taskInput');
        const taskText = input.value.trim();
        
        if (taskText !== "") {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center todo-item shadow-sm text-secondary-material fw-medium';
            li.innerHTML = `
                <span>${taskText}</span>
                <button class="btn btn-sm btn-outline-danger px-3 rounded-pill" onclick="this.parentElement.remove()">Hapus</button>
            `;
            document.getElementById('taskList').appendChild(li);
            input.value = "";
        }
    }
</script>

</body>
</html>
