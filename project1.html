<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1 - Kalkulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .calc-container { max-width: 360px; margin: 50px auto; }
        .btn-calc { height: 60px; font-size: 1.3rem; border-radius: 16px; border: none; transition: all 0.2s ease; }
        .btn-num { background-color: #ffffff; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-num:hover { background-color: var(--surface-bg); }
        .btn-op { background-color: var(--primary-light); color: var(--primary-color); font-weight: 600; }
        .btn-op:hover { background-color: var(--primary-color); color: #ffffff; }
        .btn-clear { background-color: #fdadad; color: #b71c1c; font-weight: 600; }
        .btn-clear:hover { background-color: #b71c1c; color: #ffffff; }
        .btn-equal { background-color: var(--primary-color); color: #ffffff; font-weight: 600; }
        .btn-equal:hover { opacity: 0.9; transform: scale(0.98); }
        #display { background-color: var(--surface-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 16px; font-weight: 600; font-size: 2rem; }
    </style>
</head>
<body>

<div class="container calc-container">
    <a href="index.html" class="btn btn-material mb-4">&larr; Kembali ke Index</a>
    
    <div class="material-card p-4">
        <h4 class="text-center mb-4 text-primary-material fw-bold">Kalkulator</h4>
        
        <input type="text" id="display" class="form-control mb-4 text-end py-3" disabled>
        
        <div class="row g-2">
            <div class="col-3"><button class="btn btn-calc btn-clear w-100" onclick="clearDisplay()">C</button></div>
            <div class="col-3"><button class="btn btn-calc btn-op w-100" onclick="appendValue('(')">(</button></div>
            <div class="col-3"><button class="btn btn-calc btn-op w-100" onclick="appendValue(')')">)</button></div>
            <div class="col-3"><button class="btn btn-calc btn-op w-100" onclick="appendValue('/')">/</button></div>
            
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('7')">7</button></div>
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('8')">8</button></div>
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('9')">9</button></div>
            <div class="col-3"><button class="btn btn-calc btn-op w-100" onclick="appendValue('*')">x</button></div>
            
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('4')">4</button></div>
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('5')">5</button></div>
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('6')">6</button></div>
            <div class="col-3"><button class="btn btn-calc btn-op w-100" onclick="appendValue('-')">-</button></div>
            
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('1')">1</button></div>
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('2')">2</button></div>
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('3')">3</button></div>
            <div class="col-3"><button class="btn btn-calc btn-op w-100" onclick="appendValue('+')">+</button></div>
            
            <div class="col-6"><button class="btn btn-calc btn-num w-100" onclick="appendValue('0')">0</button></div>
            <div class="col-3"><button class="btn btn-calc btn-num w-100" onclick="appendValue('.')">.</button></div>
            <div class="col-3"><button class="btn btn-calc btn-equal w-100" onclick="calculate()">=</button></div>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function appendValue(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch { display.value = 'Error'; }
    }
</script>

</body>
</html>
