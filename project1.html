<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project kenzie 1 kalkulator/title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .calc-container { max-width: 350px; margin: 50px auto; }
        .btn-calc { height: 60px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container calc-container">
    <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
            <h4 class="text-center mb-4">Kalkulator</h4>
            <input type="text" id="display" class="form-control form-control-lg mb-3 text-end fs-3" disabled>
            
            <div class="row g-2">
                <div class="col-3"><button class="btn btn-danger w-100 btn-calc" onclick="clearDisplay()">C</button></div>
                <div class="col-3"><button class="btn btn-secondary w-100 btn-calc" onclick="appendValue('(')">(</button></div>
                <div class="col-3"><button class="btn btn-secondary w-100 btn-calc" onclick="appendValue(')')">)</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 btn-calc" onclick="appendValue('/')">/</button></div>
                
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('7')">7</button></div>
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('8')">8</button></div>
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('9')">9</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 btn-calc" onclick="appendValue('*')">x</button></div>
                
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('4')">4</button></div>
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('5')">5</button></div>
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('6')">6</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 btn-calc" onclick="appendValue('-')">-</button></div>
                
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('1')">1</button></div>
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('2')">2</button></div>
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('3')">3</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 btn-calc" onclick="appendValue('+')">+</button></div>
                
                <div class="col-6"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('0')">0</button></div>
                <div class="col-3"><button class="btn btn-light w-100 btn-calc shadow-sm" onclick="appendValue('.')">.</button></div>
                <div class="col-3"><button class="btn btn-success w-100 btn-calc" onclick="calculate()">=</button></div>
            </div>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function appendValue(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch { display.value = 'Error'; }
    }
</script>

</body>
</html>
